meters:
- name: platform_seats
  description: Number of licensed users.
  unit: seat-month
  aggregation: max
  dimensions:
  - team
- name: enrichment_credits
  description: API enrichment credits consumed.
  unit: credit
  aggregation: sum
  dimensions:
  - endpoint
principles:
- name: Visibility
  description: Track API credit consumption monthly against the contracted pool.
- name: Allocation
  description: Allocate seats and credits to revenue teams (SDR, AE, marketing ops).
- name: Optimization
  description: At renewal, right-size seats and the credit pool; consolidate vendors if overlapping (Lusha, Apollo, ZoomInfo).
- name: Accountability
  description: RevOps team owns the contract and renewal.
