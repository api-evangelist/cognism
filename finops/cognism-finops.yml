description: >-
  FOCUS-aligned FinOps profile for Cognism. The cost lever is the annual enterprise contract —
  typically a fixed seat-based commitment with a bundled credit pool for API enrichment. There is no
  per-call invoicing. Cost optimization is at renewal: right-size seats and credit allotment based on
  observed consumption.
notes: Annual contract, prepaid; seats and credit pool are the optimization levers at renewal.
sources:
- https://www.cognism.com/
