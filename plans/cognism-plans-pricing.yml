description: >-
  Cognism does not publish self-serve API pricing. All access is sales-led and bundled into enterprise
  seat-based contracts that include Diamond Data (verified mobile), Intent (Bombora), and platform
  integrations (Salesforce, HubSpot, Outreach). Contract value is typically annual and includes credit
  allowances rather than per-call pricing.
notes: Sales-led pricing; no self-serve plans page. Contract values include enrichment credits and seat counts.
sources:
- https://www.cognism.com/
- https://www.cognism.com/pricing
plans:
- id: cognism-platform
  name: Cognism Platform
  type: enterprise
  description: Annual seat-based contract bundling platform UI, API enrichment, integrations, and Diamond Data. Pricing on request.
  entries:
  - label: Platform
    name: platform
    type: flat
    metric: year
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: true
  elements:
  - name: Platform UI access
  - name: API enrichment credits
  - name: Integrations (CRM, sales tools)
  - name: Diamond Data (verified mobile)
  - name: Intent Data (Bombora)
