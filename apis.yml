description: Cognism is a B2B sales intelligence platform providing verified emails,
  mobile numbers (Diamond Data), firmographic data, intent signals, and enrichment.
  Cognism exposes APIs for enrichment and integration but they are gated and not publicly
  self-serve; access is granted to enterprise customers via partnerships and integrations.
